<!DOCTYPE html>
<html lang="en">
  <head>
    <!-- Basic Meta -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="theme-color" content="#BD0000" />

    <!-- Primary Meta Tags -->
    <title>ShopLink - The Universal Online Marketplace</title>
    <meta name="title" content="ShopLink - Your Trusted Retail Marketplace" />
    <meta name="description" content="ShopLink is a modern online retail platform offering a wide range of everyday consumer products including electronics, fashion, home goods, and more. Fast delivery, reliable service, and great prices." />
    <meta name="keywords" content="ShopLink, online retail, everyday products, electronics, clothing, home goods, affordable shopping, retail store, fast delivery, Armenia, ShopLink store" />
    <meta name="author" content="ShopLink Team" />
    

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://shop-link.online" />
    <meta property="og:title" content="ShopLink - The Universal Online Marketplace for Everyone" />
    <meta property="og:description" content="ShopLink, online retail, everyday products, electronics, clothing, home goods, affordable shopping, retail store, fast delivery, Armenia, ShopLink store" />
    <meta property="og:image" content="./favicon/apple-icon-180x180.png" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://shop-link.online" />
    <meta name="twitter:title" content="ShopLink - Your Ultimate Online Shopping Destination" />
    <meta name="twitter:description" content="Shop a variety of products including electronics, fashion, and 3D prints. Great deals and fast shipping at ShopLink." />
    <meta name="twitter:image" content="./favicon/apple-icon-180x180.png" />
    <meta name="twitter:site" content="@shoplink" />

    <!-- Canonical URL -->
    <link rel="canonical" href="https://shop-link.online/" />

    <!-- Local Favicons -->
    <link rel="apple-touch-icon" sizes="180x180" href="./favicon/apple-icon-180x180.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="./favicon/android-icon-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="./favicon/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="96x96" href="./favicon/favicon-96x96.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="./favicon/favicon-16x16.png" />
    <link rel="manifest" href="./favicon/manifest.json" />
    <meta name="msapplication-TileColor" content="#ffffff" />
    <meta name="msapplication-TileImage" content="./favicon/ms-icon-144x144.png" />
    <meta name="theme-color" content="#BD0000" />

    <!-- Structured Data (JSON-LD for Google Rich Results) -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "Organization",
        "name": "ShopLink",
        "url": "https://shop-link.online",
        "logo": "./images/logo-shoplink.jpg",
        "sameAs": [
          "https://facebook.com/shoplink",
          "https://twitter.com/shoplink",
          "https://instagram.com/shoplink"
        ],
        "description": "ShopLink is a universal online marketplace offering electronics, fashion, 3D prints, and more with fast shipping and secure payments."
      }
    </script>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
